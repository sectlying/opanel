name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json
    - name: Install dependencies
      run: npm i
    - name: Run prelaunch scripts
      run: npm run prelaunch
    
    - name: Run lint
      run: npm run lint

    - name: Run unit tests
      run: npm run test
    
    - name: Run wasm unit tests
      run: npm run wasm:test

  jar:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [25]
        gradle-version: [9.3.0]
        node-version: [22.x]

    steps:
    - name: Remove unnecessary files to release disk space
      run: |
        df -h
        rm -rf /opt/hostedtoolcache
        df -h

    - uses: actions/checkout@v6
    - name: Use JDK 25, 21, 17, 14
      uses: actions/setup-java@v5
      with:
        java-version: |
          25
          21
          17
          14
        distribution: "zulu"
        cache: "gradle"
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json
    - name: Change wrapper permissions
      run: chmod +x ./gradlew

    - name: Install frontend dependencies
      run: cd frontend && npm i
    - name: Build and bundle frontend
      run: cd frontend && npm run build:pack

    - name: Build jar files
      run: JAVA_HOME=$JAVA_HOME_25_X64 ./gradlew build --stacktrace

    - name: Expose Actions runtime token
      uses: actions/github-script@v9
      with:
        script: |
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN)
          core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL)

    - name: Upload jar files
      working-directory: .github/scripts
      run: |
        npm init -y >/dev/null
        npm i @actions/artifact@^2
        node upload-jars.mjs
